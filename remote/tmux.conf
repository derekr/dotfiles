# ~/.config/tmux/tmux.conf — remote dev sessions
# The Mac setup leans on tmux but tracked no config; this is the canonical one.

# --- Color / terminfo ------------------------------------------------------
# Ghostty is the SSH client; advertise truecolor so nvim/agent colors are right.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,xterm-ghostty:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# --- Sane defaults ---------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10           # don't swallow <Esc> in nvim
set -g focus-events on
set -sg repeat-time 600
set -g set-clipboard on

# --- vi copy mode ----------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Splits keep the current path; intuitive bindings ----------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- vim-style pane navigation --------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- tmux-sessionizer popup (mirrors Ctrl-F in fish) -----------------------
bind f display-popup -E "tmux-sessionizer"

# --- Reload ----------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# --- Minimal status bar ----------------------------------------------------
set -g status-style "bg=default"
set -g status-left-length 30
set -g status-right "#[fg=cyan]#S #[fg=white]%H:%M"
